<!DOCTYPE html>

    <link rel="manifest" href="manifest.json" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <a class="skip-link" href="#main">Skip to content</a>

    <header class="site-header">

        <a class="brand" href="index.html" id="top">
          <img src="assets/logodone.png" alt="iStudio — Defined by Innovation" class="brand-logo" width="160" height="40" />

        <nav class="nav" aria-label="Primary">
          <a href="index.html" data-i18n="nav.home">Home</a>
          <a href="about.html" data-i18n="nav.about">About</a>
          <a href="track.html" data-i18n="nav.track">Track</a>
          <a href="inspire.html" data-i18n="nav.inspire">Design discovery</a>
          <a href="students.html" data-i18n="nav.students">Students</a>
          <a href="experience.html" data-i18n="nav.experience">Experience</a>
          <a href="smart.html" data-i18n="nav.smart">Smart Chapter</a>
        </nav>
        <div class="header-actions">
          <button type="button" class="btn btn-ghost" id="btn-install" hidden data-i18n="install.hint">Install app</button>

        </div>
      </div>
      <nav class="nav-strip" aria-label="Primary mobile">
        <a href="index.html" data-i18n="nav.home">Home</a>
        <a href="about.html" data-i18n="nav.about">About</a>
        <a href="track.html" data-i18n="nav.track">Track</a>
        <a href="inspire.html" data-i18n="nav.inspire">Design</a>
        <a href="students.html" data-i18n="nav.students">Students</a>
        <a href="experience.html" data-i18n="nav.experience">Experience</a>
        <a href="smart.html" data-i18n="nav.smart">Smart</a>
      </nav>

        <div class="about-copy">
          <span class="section-label" data-i18n="about.label">01 · About iStudio</span>

        <div id="our-projects" class="about-grid">
          <figure><img src="assets/about-1.jpg" alt="" data-i18n-alt="about.imgAlt" loading="lazy" /></figure>
          <figure><img src="assets/about-2.jpg" alt="" loading="lazy" /></figure>
          <figure><img src="assets/about-3.jpg" alt="" loading="lazy" /></figure>
          <figure><img src="assets/about-4.jpg" alt="" loading="lazy" /></figure>
          <figure><img src="assets/about-5.jpg" alt="" loading="lazy" /></figure>
          <figure><img src="assets/about-6.jpg" alt="" loading="lazy" /></figure>
        </div>
      </section>

        <p id="hub-label" class="section-label hub-section-label" data-i18n="hub.label">Navigate</p>
        <nav class="hub-grid" aria-describedby="hub-label">
          <a href="track.html" class="hub-card hub-card--ink">

          <a href="smart.html" class="hub-card hub-card--terracotta">
